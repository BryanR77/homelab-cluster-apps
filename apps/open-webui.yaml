apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: open-webui
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://helm.openwebui.com/
      chart: open-webui
      targetRevision: 12.5.0
      helm:
        valueFiles:
          - $values/open-webui/values.yaml
    - repoURL: https://github.com/BryanR77/homelab-cluster-apps-values.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/BryanR77/homelab-cluster-apps-values.git
      targetRevision: HEAD
      path: open-webui/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: open-webui
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
